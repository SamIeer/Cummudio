version: "3.9"

services:
  db:
    image: postgress:15
    container_name: speech_db
    restart: always
    environment:
      POSTGRES_USER: 
      POSTGRES_PASSWORD:
      POSTGRES_DB: cummudio
    ports:
      - "5432:5432"
    volumes:
      - postgress_data:/var/lib/postgresql/postgress_data

  app:
    build: .
    container_name: speech_db
    command: uvcorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/commudio

  volumes:
    postgres_data: